<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Рулетка Millers</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="parallax-bg"></div>
<div id="main-container">
  <div id="wheel-container">
    <div id="wheel"></div>
    <div id="pointer"></div>
  </div>
  <div id="participants-container">
    <h3>Участники</h3>
    <ul id="items"></ul>
    <input id="newItem" type="text" placeholder="Добавить участника" />
    <div class="buttons-row">
      <button id="add-button" class="btn">Добавить участника</button>
      <button id="spin-button" class="btn">Крутить колесо</button>
    </div>
    <button id="exclude-button" class="btn">Подкрутка Маги</button>
    <div class="theme-label">
      <label for="theme-select">Тема рулетки:</label><br />
    </div>
    <select id="theme-select">
      <option value="huligan">Russian Huligan</option>
      <option value="millers">Millers</option>
      <option value="wedding">Wedding</option>
    </select>
  </div>
</div>
<div id="dialog" style="display:none;">
  <div id="dialog-content">
    <p id="winner-text"></p>
    <button id="remove-btn" class="btn">Убрать победителя</button>
    <button class="btn" onclick="document.getElementById('dialog').style.display = 'none'">Закрыть</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
